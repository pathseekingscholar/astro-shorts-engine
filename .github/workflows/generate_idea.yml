name: Generate Learning Short

on:
  schedule:
    - cron: '0 */24 * * *'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to YouTube after rendering'
        type: boolean
        default: true
      privacy:
        description: 'YouTube privacy status for manual runs'
        type: choice
        options:
          - public
          - unlisted
          - private
        default: public

permissions:
  contents: write

concurrency:
  group: astro-shorts-repo-writes
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate learning short
        run: npm run auto:github

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python upload dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Upload to YouTube
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload == true }}
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_PRIVACY_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.privacy || 'public' }}
        run: python scripts/youtube_uploader.py

      - name: Save to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generated learning Short" && git pull --rebase origin main && git push)

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: videos_output/*.mp4
          retention-days: 30
